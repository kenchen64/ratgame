<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rat Game Mini App</title>
    <!-- 1. 引入 Telegram Web App 核心腳本 -->
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .stats { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .btn-click { background: #0088cc; color: white; width: 100%; height: 100px; font-weight: bold; }
        .btn-action { background: #34a853; color: white; }
        .btn-shield { background: #fbbc05; color: white; }
        button:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>

    <div class="stats">
        <h2 id="username">載入中...</h2>
        <p>餘額: <span id="balance">0</span> 💰</p>
        <p id="shield-status">🛡️ 無護盾</p>
    <h3>🏆 全服排行榜</h3>
    <ul id="leaderboard-list" style="list-style: none; padding: 0; text-align: left;">
        <li>載入中...</li>
    </ul>

    </div>

    <button class="btn-click" onclick="gameAction('/click')">按我賺錢！(+1)</button><br>
    <button class="btn-action" onclick="gameAction('/steal')">隨機偷取 (20%)</button>
    <button class="btn-shield" onclick="gameAction('/shield')">買護盾 (50 💰/60秒)</button>

    <script>
        // 初始化 Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // 自動展開成全螢幕

        // 核心封裝：發送帶有驗證資料的請求
        async function apiRequest(endpoint, data = {}) {
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        // 2. 這是後端用來驗證身分的關鍵
                        'x-telegram-init-data': tg.initData 
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.status === 401 || response.status === 403) {
                    alert('身分驗證失敗，請從 Telegram 重新進入遊戲');
                    return null;
                }

                return await response.json();
            } catch (err) {
                console.error('API Error:', err);
                return null;
            }
        }

        // 更新介面
        function updateUI(user) {
            if (!user) return;
            document.getElementById('username').innerText = `🐭 ${user.username}`;
            document.getElementById('balance').innerText = user.balance;
            
            const shieldRemaining = user.shieldUntil - Date.now();
            if (shieldRemaining > 0) {
                document.getElementById('shield-status').innerText = `🛡️ 護盾剩下 ${Math.ceil(shieldRemaining/1000)} 秒`;
            } else {
                document.getElementById('shield-status').innerText = '🛡️ 無護盾';
            }
        }

        // 動作處理
        async function gameAction(path) {
            const res = await apiRequest(path);
            if (res) {
                if (res.msg) {
                    // 使用 Telegram 原生通知彈窗
                    tg.showAlert(res.msg);
                }
                // 動作完成後重新獲取最新狀態
                fetchUserData();
            }
        }

        // 獲取初始資料
        async function fetchUserData() {
            const user = await apiRequest('/me');
            updateUI(user);
        }

        // 每 5 秒自動重新整理一次狀態（可選）
        setInterval(fetchUserData, 5000);
        
        // 進入頁面立即執行
        fetchUserData();

    </script>
</body>
</html>
