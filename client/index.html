<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rat Game - Mini App</title>
    <script src="https://telegram.org"></script>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #1a1a1a; color: white; user-select: none; }
        .rat-btn { transition: transform 0.1s active:scale-95; }
        .shield-active { border: 2px solid #34d399; box-shadow: 0 0 15px #34d399; }
    </style>
</head>
<body class="flex flex-col items-center justify-between min-h-screen p-6">

    <!-- 頂部資訊 -->
    <div class="w-full flex justify-between items-center bg-gray-800 p-4 rounded-xl shadow-lg">
        <div>
            <p class="text-gray-400 text-xs">玩家</p>
            <p id="username" class="font-bold text-lg">載入中...</p>
        </div>
        <div class="text-right">
            <p class="text-gray-400 text-xs">餘額</p>
            <p id="balance" class="font-bold text-2xl text-yellow-400">0</p>
        </div>
    </div>

    <!-- 遊戲主體 -->
    <div class="flex flex-col items-center space-y-8">
        <div id="rat-container" class="relative">
            <button id="clickBtn" class="rat-btn text-8xl bg-gray-700 p-10 rounded-full shadow-2xl">
                🐭
            </button>
            <div id="shield-status" class="hidden absolute -top-2 -right-2 bg-green-500 text-white text-xs px-2 py-1 rounded-full">
                🛡️ 護盾中
            </div>
        </div>
        <p class="text-gray-400">點擊老鼠來賺錢！</p>
    </div>

    <!-- 動作按鈕 -->
    <div class="w-full grid grid-cols-2 gap-4">
        <button onclick="performAction('steal')" class="bg-red-600 hover:bg-red-700 p-4 rounded-xl font-bold flex flex-col items-center">
            <span>🥷 偷竊</span>
            <span class="text-xs font-normal opacity-80">隨機目標</span>
        </button>
        <button onclick="performAction('shield')" class="bg-blue-600 hover:bg-blue-700 p-4 rounded-xl font-bold flex flex-col items-center">
            <span>🛡️ 護盾</span>
            <span class="text-xs font-normal opacity-80">50 金幣 / 60秒</span>
        </button>
    </div>

    <script>
        const API_BASE = 'https://ratgame.onrender.com';
        const tg = window.Telegram.WebApp;
        tg.expand(); // 展開視窗

        // 從 Telegram 獲取使用者資料
        const user = tg.initDataUnsafe?.user || { id: 12345, username: '測試玩家' };
        
        const state = {
            telegramId: user.id,
            username: user.username
        };

        // 更新介面
        async function updateUI() {
            try {
                const res = await fetch('/me', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(state)
                });
                const data = await res.json();
                
                document.getElementById('username').innerText = data.username;
                document.getElementById('balance').innerText = Math.floor(data.balance);
                
                // 護盾狀態
                const shieldStatus = document.getElementById('shield-status');
                const ratBtn = document.getElementById('clickBtn');
                if (data.shieldUntil > Date.now()) {
                    shieldStatus.classList.remove('hidden');
                    ratBtn.classList.add('shield-active');
                } else {
                    shieldStatus.classList.add('hidden');
                    ratBtn.classList.remove('shield-active');
                }
            } catch (e) {
                console.error("更新失敗", e);
            }
        }

        // 點擊事件
        document.getElementById('clickBtn').addEventListener('click', async () => {
            try {
                const res = await fetch('/click', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegramId: state.telegramId })
                });
                const data = await res.json();
                
                if (data.msg === '+1') {
                    // 觸發震動
                    tg.HapticFeedback.impactOccurred('light');
                    updateUI();
                } else {
                    tg.showAlert(data.msg);
                }
            } catch (e) {
                console.error(e);
            }
        });

        // 偷竊與護盾動作
        async function performAction(type) {
            try {
                const res = await fetch(`/${type}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegramId: state.telegramId })
                });
                const data = await res.json();
                tg.showAlert(data.msg);
                updateUI();
            } catch (e) {
                console.error(e);
            }
        }

        // 初始化與定時刷新
        updateUI();
        setInterval(updateUI, 5000); // 每 5 秒自動同步一次資料
    </script>
</body>
</html>
