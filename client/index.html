<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body{
      background:#111;
      color:#fff;
      font-family:sans-serif;
      text-align:center;
    }
    button{
      padding:15px;
      margin:10px;
      width:200px;
      font-size:18px;
      border:none;
      border-radius:10px;
      background:#00c853;
      color:white;
    }
  </style>
</head>
<body>

<h1>🐭 Rat Game</h1>

<div id="info"></div>

<button onclick="clickCoin()">🖱 點擊</button>
<button onclick="steal()">⚔️ 偷</button>
<button onclick="shield()">🛡️ 護盾</button>
<button onclick="load()">🔄 更新</button>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe.user;

async function api(path,data={}){
  return fetch(path,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      telegramId:user.id,
      ...data
    })
  }).then(r=>r.json());
}

async function load(){
  const res = await api('/me');
  document.getElementById('info').innerHTML = `
    👤 ${res.username}<br>
    🧀 ${res.balance}
  `;
}

async function clickCoin(){
  await api('/click');
  load();
}

async function steal(){
  const res = await api('/steal');
  alert(res.msg);
  load();
}

async function shield(){
  const res = await api('/shield');
  alert(res.msg);
  load();
}

load();
</script>

</body>
</html>
