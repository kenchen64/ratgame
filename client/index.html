<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rat Game Mini App</title>
    <!-- 1. 引入 Telegram Web App 核心腳本 -->
    <script src="https://telegram.org"></script>
<style>
    :root {
        --primary-color: #0088cc;
        --accent-color: #fbbc05;
        --danger-color: #ff4d4d;
        --success-color: #2ecc71;
        --bg-gradient: linear-gradient(135deg, #1d2b64 0%, #f8cdda 100%);
        --glass-bg: rgba(255, 255, 255, 0.9);
    }

    body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg-gradient);
        background-attachment: fixed;
        margin: 0;
        padding: 20px;
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    /* 玻璃卡片容器 */
    .container {
        width: 100%;
        max-width: 400px;
        background: var(--glass-bg);
        border-radius: 24px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        backdrop-filter: blur(10px);
        box-sizing: border-box;
    }

    /* 頂部玩家資訊 */
    .user-profile {
        text-align: center;
        margin-bottom: 25px;
    }

    #username {
        margin: 10px 0 5px;
        font-size: 24px;
        color: #1d2b64;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 20px;
    }

    .stat-card {
        background: #f0f2f5;
        padding: 12px;
        border-radius: 15px;
        text-align: center;
    }

    .stat-label { font-size: 12px; color: #666; text-transform: uppercase; }
    .stat-value { font-size: 18px; font-weight: bold; display: block; color: var(--primary-color); }

    /* 動作按鈕 */
    .main-click-area {
        position: relative;
        margin: 30px 0;
        text-align: center;
    }

    .btn-click {
        width: 160px;
        height: 160px;
        background: radial-gradient(circle, #00aaff, #0088cc);
        border: 8px solid rgba(255,255,255,0.5);
        border-radius: 50%;
        color: white;
        font-size: 22px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(0,136,204,0.4);
        transition: transform 0.1s, box-shadow 0.2s;
    }

    .btn-click:active {
        transform: scale(0.92);
        box-shadow: 0 4px 10px rgba(0,136,204,0.3);
    }

    .action-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
    }

    .btn-sm {
        flex: 1;
        min-width: 100px;
        padding: 12px;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        color: white;
        transition: 0.2s;
    }

    .btn-steal { background: var(--danger-color); }
    .btn-shield { background: var(--accent-color); }
    .btn-invite { background: var(--success-color); width: 100%; margin-top: 5px; }

    /* 排行榜樣式 */
    .leaderboard {
        margin-top: 25px;
        border-top: 1px solid #ddd;
        padding-top: 15px;
    }

    .leaderboard h3 { margin-bottom: 15px; font-size: 18px; color: #444; }

    .leader-item {
        display: flex;
        align-items: center;
        padding: 10px;
        background: rgba(255,255,255,0.5);
        border-radius: 10px;
        margin-bottom: 8px;
    }

    .rank-num { width: 30px; font-weight: bold; color: #888; }
    .player-name { flex: 1; font-weight: 500; }
    .player-bal { font-weight: bold; color: var(--primary-color); }

    /* 護盾特效 */
    .shield-active {
        border: 2px solid var(--accent-color);
        animation: pulse-shield 2s infinite;
    }

    @keyframes pulse-shield {
        0% { box-shadow: 0 0 0 0 rgba(251, 188, 5, 0.4); }
        70% { box-shadow: 0 0 0 10px rgba(251, 188, 5, 0); }
        100% { box-shadow: 0 0 0 0 rgba(251, 188, 5, 0); }
    }
</style>

</head>
<body>

    <div class="container" id="app-container">
        <div class="user-profile">
            <h2 id="username">載入中...</h2>
            <div id="shield-status" style="font-size: 13px; font-weight: bold; color: #fbbc05;">🛡️ 無護盾</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">錢包餘額</span>
                <span class="stat-value"><span id="balance">0</span> 💰</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">全球排名</span>
                <span class="stat-value">#<span id="my-rank">--</span></span>
            </div>
        </div>

        <div class="main-click-area">
            <button class="btn-click" onclick="gameAction('/click')">PUSH!</button>
        </div>

        <div class="action-group">
            <button class="btn-sm btn-steal" onclick="gameAction('/steal')">🥷 偷取</button>
            <button class="btn-sm btn-shield" onclick="gameAction('/shield')">🛡️ 護盾</button>
            <button class="btn-sm btn-invite" onclick="shareInvite()">📢 邀請好友賺 100 💰</button>
        </div>

        <div class="leaderboard">
            <h3>🏆 全服排行榜</h3>
            <div id="leaderboard-list">
                <!-- 排行榜項目會動態插入 -->
            </div>
        </div>
    </div>

    <script>
        // 初始化 Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // 自動展開成全螢幕

        // 核心封裝：發送帶有驗證資料的請求
        async function apiRequest(endpoint, data = {}) {
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        // 2. 這是後端用來驗證身分的關鍵
                        'x-telegram-init-data': tg.initData 
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.status === 401 || response.status === 403) {
                    alert('身分驗證失敗，請從 Telegram 重新進入遊戲');
                    return null;
                }

                return await response.json();
            } catch (err) {
                console.error('API Error:', err);
                return null;
            }
        }

        // 更新介面
        function updateUI(user) {
    if (!user) return;
    document.getElementById('username').innerText = `🐭 ${user.username}`;
    document.getElementById('balance').innerText = user.balance.toLocaleString();
    document.getElementById('my-rank').innerText = user.rank;
    
    const container = document.getElementById('app-container');
    const shieldStatus = document.getElementById('shield-status');
    const shieldRemaining = user.shieldUntil - Date.now();
    
    if (shieldRemaining > 0) {
        container.classList.add('shield-active');
        shieldStatus.innerText = `🛡️ 護盾剩餘 ${Math.ceil(shieldRemaining/1000)} 秒`;
    } else {
        container.classList.remove('shield-active');
        shieldStatus.innerText = '🛡️ 無護盾';
    }
}


//邀請參數
function shareInvite() {
    const botUsername = 'RatClickerGameBot'; // 例如: MyRatGame_bot
    const userId = tg.initDataUnsafe.user.id;
    
    // 構造帶有 start 參數的連結
    const inviteLink = `https://t.me{botUsername}?start=${userId}`;
    const shareText = "快來跟我一起玩鼠鼠大作戰，點擊連結送 100 金幣！";
    
    // 使用 Telegram 原生分享介面
    const fullUrl = `https://t.me{encodeURIComponent(inviteLink)}&text=${encodeURIComponent(shareText)}`;
    tg.openTelegramLink(fullUrl);
}

// 獲取並渲染排行榜
async function updateLeaderboard() {
    const players = await apiRequest('/leaderboard');
    if (!players) return;

    const listElement = document.getElementById('leaderboard-list');
    listElement.innerHTML = ''; // 清空舊內容

    players.forEach((player, index) => {
        const li = document.createElement('li');
        li.style.padding = '8px 0';
        li.style.borderBottom = '1px solid #eee';
        
        // 前三名加上獎盃符號
        const medals = ['🥇', '🥈', '🥉'];
        const rank = medals[index] || `${index + 1}.`;
        
        li.innerHTML = `
            <span style="width: 30px; display: inline-block;">${rank}</span>
            <strong>${player.username}</strong> 
            <span style="float: right;">${player.balance} 💰</span>
        `;
        listElement.appendChild(li);
    });
}

// 修改原有的 fetchUserData 函式，順便更新排行榜
async function fetchUserData() {
    const user = await apiRequest('/me');
    updateUI(user);
    updateLeaderboard(); // 更新排行榜
}

        // 動作處理
        async function gameAction(path) {
            const res = await apiRequest(path);
            if (res) {
                if (res.msg) {
                    // 使用 Telegram 原生通知彈窗
                    tg.showAlert(res.msg);
                }
                // 動作完成後重新獲取最新狀態
                fetchUserData();
            }
        }

        // 獲取初始資料
        async function fetchUserData() {
            const user = await apiRequest('/me');
            updateUI(user);
        }

        // 每 5 秒自動重新整理一次狀態（可選）
        setInterval(fetchUserData, 5000);
        
        // 進入頁面立即執行
        fetchUserData();

    </script>
</body>
</html>
